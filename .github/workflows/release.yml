name: Publish beta release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/release.yml
      - scripts/**
      - src/**
      - native/**
      - com.yechan.threaddeck.sdPlugin/**

permissions:
  contents: write

concurrency:
  group: threaddeck-beta-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and verify
        run: |
          pnpm run build
          pnpm run audit
          pnpm run check
          pnpm run pack:artifact
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-beta" >> "$GITHUB_OUTPUT"
      - name: Publish Stream Deck pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          artifact="release/com.yechan.threaddeck.streamDeckPlugin"
          checksum="$(shasum -a 256 "$artifact" | awk '{print $1}')"
          notes_file="$RUNNER_TEMP/threaddeck-release-notes.md"
          {
            echo "ThreadDeck ${RELEASE_VERSION} beta fixes installed native-helper permissions, current Codex Fast mode switching, and push-to-talk media safety."
            echo
            echo "- self-repairs keybridge executable permissions stripped by Stream Deck packaging"
            echo "- recognizes and toggles the latest Korean Fast / Standard speed submenu"
            echo "- performs each Fast mode inversion in one native menu transaction"
            echo "- uses accessibility focus plus keyboard activation with no pointer movement"
            echo "- leaves already-paused media paused when voice input starts"
            echo "- verifies the installed-layout permission repair during release packaging"
            echo
            echo "SHA-256: \`${checksum}\`"
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "ThreadDeck ${RELEASE_VERSION} beta" \
              --notes-file "$notes_file" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$artifact" --clobber
          else
            gh release create "$RELEASE_TAG" "$artifact" \
              --target "$GITHUB_SHA" \
              --title "ThreadDeck ${RELEASE_VERSION} beta" \
              --notes-file "$notes_file" \
              --prerelease
          fi
