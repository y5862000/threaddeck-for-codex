name: Publish beta release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/release.yml
      - scripts/**
      - src/**
      - native/**
      - com.yechan.threaddeck.sdPlugin/**

permissions:
  contents: write

concurrency:
  group: threaddeck-beta-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and verify
        run: |
          pnpm run build
          pnpm run audit
          pnpm run check
          pnpm run pack:artifact
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-beta" >> "$GITHUB_OUTPUT"
      - name: Publish Stream Deck pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          artifact="release/com.yechan.threaddeck.streamDeckPlugin"
          checksum="$(shasum -a 256 "$artifact" | awk '{print $1}')"
          notes_file="$RUNNER_TEMP/threaddeck-release-notes.md"
          {
            echo "ThreadDeck ${RELEASE_VERSION} beta consolidates the Stream Deck Neo reliability and remote-task UX updates."
            echo
            echo "- exact-host local and pinned-remote task switching"
            echo "- exact-turn remote reasoning depth and Fast / Standard detection"
            echo "- independent Current / Last and Top Task 1-8 actions"
            echo "- hardened completion, queue, goal timing, hold-to-talk, and media behavior"
            echo "- refreshed bilingual documentation, profile, screenshots, and GIFs"
            echo
            echo "SHA-256: \`${checksum}\`"
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "ThreadDeck ${RELEASE_VERSION} beta" \
              --notes-file "$notes_file" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$artifact" --clobber
          else
            gh release create "$RELEASE_TAG" "$artifact" \
              --target "$GITHUB_SHA" \
              --title "ThreadDeck ${RELEASE_VERSION} beta" \
              --notes-file "$notes_file" \
              --prerelease
          fi
