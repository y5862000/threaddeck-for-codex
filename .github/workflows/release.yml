name: Publish release

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: threaddeck-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
      - name: Refuse an existing release version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1 \
            || gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::${RELEASE_TAG} already exists. Bump package.json before publishing another release."
            exit 1
          fi
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and verify
        run: |
          pnpm run build
          pnpm run audit
          pnpm run check
          pnpm run pack:artifact
      - name: Publish Stream Deck as the latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          artifact="release/com.yechan.threaddeck.streamDeckPlugin"
          checksum_file="${artifact}.sha256"
          profile="release/threaddeck-for-codex-neo.streamDeckProfile"
          profile_checksum_file="${profile}.sha256"
          checksum="$(awk '{print $1}' "$checksum_file")"
          profile_checksum="$(awk '{print $1}' "$profile_checksum_file")"
          notes_file="$RUNNER_TEMP/threaddeck-release-notes.md"
          {
            echo "ThreadDeck for Codex v${RELEASE_VERSION}"
            echo
            awk -v version="${RELEASE_VERSION}" '
              index($0, "## " version " — ") == 1 { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md
            echo
            echo "SHA-256: \`${checksum}\`"
            echo "Neo profile SHA-256: \`${profile_checksum}\`"
          } > "$notes_file"

          gh release create "$RELEASE_TAG" \
            "$artifact" "$checksum_file" "$profile" "$profile_checksum_file" \
            --target "$GITHUB_SHA" \
            --title "ThreadDeck for Codex v${RELEASE_VERSION}" \
            --notes-file "$notes_file" \
            --latest
