name: Publish beta release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/release.yml
      - scripts/**
      - src/**
      - native/**
      - com.yechan.threaddeck.sdPlugin/**

permissions:
  contents: write

concurrency:
  group: threaddeck-beta-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and verify
        run: |
          pnpm run build
          pnpm run audit
          pnpm run check
          pnpm run pack:artifact
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-beta" >> "$GITHUB_OUTPUT"
      - name: Publish Stream Deck pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          artifact="release/com.yechan.threaddeck.streamDeckPlugin"
          checksum_file="${artifact}.sha256"
          checksum="$(awk '{print $1}' "$checksum_file")"
          notes_file="$RUNNER_TEMP/threaddeck-release-notes.md"
          {
            echo "ThreadDeck ${RELEASE_VERSION} beta makes the Codex Stream Deck experience English-first, bilingual, and easier to install on another Mac."
            echo
            echo "- follows Stream Deck's app language automatically: English by default, Korean when the app uses Korean"
            echo "- ships English action names, key status copy, screenshots, and GIF demonstrations"
            echo "- keeps stable language-neutral activity codes behind the key renderer"
            echo "- adds a clearer one-package install path and bilingual setup documentation"
            echo "- includes the latest Effort, Fast mode, voice, completion, permission, and media-control fixes"
            echo "- documents the macOS platform boundary for future Windows contributors"
            echo
            echo "SHA-256: \`${checksum}\`"
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "ThreadDeck ${RELEASE_VERSION} beta" \
              --notes-file "$notes_file" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$artifact" "$checksum_file" --clobber
          else
            gh release create "$RELEASE_TAG" "$artifact" "$checksum_file" \
              --target "$GITHUB_SHA" \
              --title "ThreadDeck ${RELEASE_VERSION} beta" \
              --notes-file "$notes_file" \
              --prerelease
          fi
